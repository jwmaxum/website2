name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: default_website_aistudio2
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notice when Cloudflare API Token is missing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::notice::CLOUDFLARE_API_TOKEN secret is not set in GitHub Repository Secrets."
          echo "Cloudflare Pages automatic deployment via GitHub integration is active, or add CLOUDFLARE_API_TOKEN to GitHub Secrets."
